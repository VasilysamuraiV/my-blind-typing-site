<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Твой идеальный тренажёр слепой печати</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        body {
            background: linear-gradient(145deg, #1e2b3c 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        .trainer-card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7);
        }
        h1 {
            color: #b7e0ff;
            font-weight: 400;
            font-size: 28px;
            letter-spacing: 2px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            text-shadow: 0 2px 5px rgba(0,160,255,0.3);
        }
        .input-section {
            margin-bottom: 30px;
        }
        .label {
            display: block;
            color: #a0b8cc;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .source-textarea {
            width: 100%;
            padding: 18px 20px;
            background: #1e2f3f;
            border: 2px solid #314a5e;
            border-radius: 24px;
            color: #e0f0ff;
            font-size: 18px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            font-family: 'Courier New', monospace;
        }
        .source-textarea:focus {
            border-color: #4aa5ff;
            background: #1a2c3d;
            box-shadow: 0 0 0 4px rgba(74, 165, 255, 0.2);
        }
        .set-text-btn {
            background: #2f4e6b;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #122b3a;
            transition: 0.1s ease;
            letter-spacing: 1px;
            border: 1px solid #5788aa;
        }
        .set-text-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #122b3a;
        }
        .typing-area {
            background: #0f1c26;
            border-radius: 32px;
            padding: 30px;
            border: 2px solid #2b4d66;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.6);
            margin: 25px 0 20px;
        }
        .reference-line {
            font-size: 32px;
            font-weight: 500;
            font-family: 'Courier New', monospace;
            color: #a2c4dc;
            background: #10232f;
            padding: 20px 25px;
            border-radius: 30px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            border: 1px solid #2d5777;
            box-shadow: 0 4px 0 #071016;
            letter-spacing: 1px;
            margin-bottom: 25px;
            transition: background-color 0.15s, box-shadow 0.1s;
        }
        .error-flash {
            background-color: #550000 !important;
            box-shadow: 0 0 20px #ff3a3a, inset 0 0 10px #ff7979 !important;
            border-color: #ff8888 !important;
            transition: 0.08s;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            color: #bbd6f0;
            background: #0a1a25;
            padding: 15px 20px;
            border-radius: 40px;
            border: 1px solid #2f5570;
            font-size: 20px;
            margin-top: 15px;
        }
        .progress-fill {
            height: 12px;
            background: #1b445e;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            margin: 0 20px;
        }
        .progress-fill span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, #3ecf8e, #a0e56e);
            width: 0%;
            transition: width 0.2s;
        }
        .counter {
            font-weight: 700;
            background: #132b39;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 22px;
            color: #a2e0ff;
        }
        .typed-info {
            font-size: 18px;
            color: #7b9eb3;
        }
        .reset-btn {
            background: transparent;
            border: 2px dashed #3b637e;
            color: #98bcd6;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .reset-btn:hover {
            background: #183f55;
            border: 2px solid #5e9bc9;
            color: white;
        }
        .helper-note {
            color: #5b7e98;
            text-align: center;
            font-size: 16px;
            margin: 25px 0 0;
        }
        kbd {
            background: #263b4a;
            border-radius: 8px;
            padding: 4px 10px;
            color: #c9e2ff;
            border: 1px solid #4c7c9c;
        }
    </style>
</head>
<body>

<div class="trainer-card">
    <h1>⌨️ СЛЕПАЯ ПЕЧАТЬ · ERROR LOCK</h1>
    
    <div class="input-section">
        <div class="label">📄 твой текст (вставь любой)</div>
        <textarea id="sourceText" class="source-textarea" rows="3" placeholder="Вставь сюда английский текст, например: The quick brown fox jumps over the lazy dog...">The quick brown fox jumps over the lazy dog.</textarea>
        <button id="loadTextBtn" class="set-text-btn">⚡ ЗАГРУЗИТЬ В ТРЕНАЖЁР</button>
    </div>

    <!-- Основная зона печати -->
    <div id="typingArea" class="typing-area">
        <div id="referenceDisplay" class="reference-line">The quick brown fox jumps over the lazy dog.</div>
        
        <div class="progress-stats">
            <span class="typed-info">✅ <span id="correctCount">0</span></span>
            <div class="progress-fill">
                <span id="progressWidth" style="width: 0%;"></span>
            </div>
            <span class="counter"><span id="remainingCount">43</span> осталось</span>
        </div>
    </div>

    <button id="resetBtn" class="reset-btn">⟲ НАЧАТЬ ЗАНОВО (сброс позиции)</button>
    <div class="helper-note">
        <kbd>←</kbd> ошибка блокирует ввод · поле мигает красным · ошибайся и учись!
    </div>
</div>

<script>
    (function() {
        // ----- Состояние тренажёра -----
        let targetText = "The quick brown fox jumps over the lazy dog.";  // эталон
        let currentIndex = 0;             // сколько символов уже правильно набрано
        let isErrorMode = false;           // флаг: ошиблись? тогда блокируем ввод правильных
        
        // DOM элементы
        const referenceDisplay = document.getElementById('referenceDisplay');
        const sourceTextarea = document.getElementById('sourceText');
        const loadTextBtn = document.getElementById('loadTextBtn');
        const resetBtn = document.getElementById('resetBtn');
        const correctSpan = document.getElementById('correctCount');
        const remainingSpan = document.getElementById('remainingCount');
        const progressWidth = document.getElementById('progressWidth');
        const typingArea = document.getElementById('typingArea'); // для сброса мигания

        // ---- Вспомогательная функция обновления интерфейса (подсветка/счётчики) ----
        function updateDisplay() {
            if (!referenceDisplay) return;
            
            // Подсветка набранной части (серым цветом) и оставшейся
            let beforeCursor = targetText.substring(0, currentIndex);
            let atCursor = targetText.length > currentIndex ? targetText[currentIndex] : '';
            let afterCursor = targetText.length > currentIndex + 1 ? targetText.substring(currentIndex + 1) : '';
            
            // если ошибка, мы не двигаем курсор, но подсветка всё равно корректна.
            // можно добавить символ курсора "|" для ясности
            let displayHtml = '';
            if (currentIndex < targetText.length) {
                // часть до курсора — зелёная (уже набрано верно)
                displayHtml = '<span style="color: #6fcf97; text-decoration: none;">' + escapeHtml(beforeCursor) + '</span>';
                // текущий символ (где стоит курсор) — подчеркнут + жирный
                displayHtml += '<span style="background-color: #2d5f7a; color: white; font-weight: bold; border-radius: 4px; padding: 2px 0;">' + escapeHtml(atCursor) + '</span>';
                // остаток — тусклый
                displayHtml += '<span style="color: #62899e;">' + escapeHtml(afterCursor) + '</span>';
            } else {
                // весь текст напечатан, всё зелёное
                displayHtml = '<span style="color: #6fcf97;">' + escapeHtml(targetText) + '</span>';
            }
            referenceDisplay.innerHTML = displayHtml;

            // Обновить счётчики
            correctSpan.textContent = currentIndex;
            const remaining = targetText.length - currentIndex;
            remainingSpan.textContent = remaining;
            const percent = targetText.length ? (currentIndex / targetText.length) * 100 : 0;
            progressWidth.style.width = percent + '%';
        }

        // вспомогательная функция для защиты от XSS (экранирование)
        function escapeHtml(unsafe) {
            if (!unsafe) return unsafe;
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }

        // ---- функция сброса тренажёра ----
        function resetTyping() {
            currentIndex = 0;
            isErrorMode = false;  // выходим из ошибочного режима
            referenceDisplay.classList.remove('error-flash'); // убираем красный
            updateDisplay();
        }

        // ---- загрузка нового текста из textarea ----
        function loadTextFromInput() {
            let newText = sourceTextarea.value;
            if (!newText || newText.trim() === '') {
                newText = "The quick brown fox jumps over the lazy dog."; // fallback
                sourceTextarea.value = newText;
            }
            // сохраняем как есть (включая пробелы, знаки препинания)
            targetText = newText;
            resetTyping();  // currentIndex = 0, сброс ошибок, обновить показ
        }

        // ---- обработчик нажатий клавиш ----
        function handleKeyDown(e) {
            // игнорируем, если это модификаторы (Ctrl, Alt, Shift и т.д.) отдельно
            const key = e.key;
            
            // разрешаем комбинации с Ctrl (например, Ctrl+R, Ctrl+V — не мешаем)
            if (e.ctrlKey || e.altKey || e.metaKey) {
                return; // полностью пропускаем, чтобы не блокировать reload и т.д.
            }

            // специальные служебные клавиши — пропускаем (стрелки, backspace, tab, escape...)
            if (key === 'Backspace' || key === 'Tab' || key === 'Escape' || key === 'F5' || key === 'F12' ||
                key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight' ||
                key === 'Home' || key === 'End' || key === 'PageUp' || key === 'PageDown' ||
                key === 'CapsLock' || key === 'Shift' || key === 'Control' || key === 'Alt' || key === 'Meta' ||
                key === 'Insert' || key === 'Delete') {
                return; // не блокируем, но и не обрабатываем как ввод символов
            }

            // Если текст уже полностью набран — ничего не делаем, но даём звуковой намёк?
            if (currentIndex >= targetText.length) {
                e.preventDefault();
                return;
            }

            // --- ОСНОВНАЯ ЛОГИКА ПРОВЕРКИ ---
            const expectedChar = targetText[currentIndex];
            const pressedChar = key; // для обычных символов

            // если длина 1 и это буква/цифра/знак — учитываем регистр?
            // Сравниваем точно (с учётом регистра) — для английского идеально
            if (pressedChar.length === 1) {
                // Сравниваем символы
                if (pressedChar === expectedChar) {
                    // правильно! проверяем, нет ли режима ошибки.
                    if (isErrorMode) {
                        // мы всё ещё в красном поле? тогда даже правильный символ не двигает курсор,
                        // нужно сперва выйти из ошибки. (то есть блокировка полная)
                        // Заблокировано: даже правильные буквы не засчитываются, пока не исправим.
                        // По условию: "текст дальше не печатался пока я не напишу правильную букву".
                        // значит игнорируем правильные, пока не исправим.
                        // НО! По логике ошибки — надо чтобы после ошибки можно было нажать ТУ ЖЕ правильную букву?
                        // Ты хотел: "пока я не напишу правильную букву" — т.е. правильная буква (та же) выключает ошибку.
                        // давай сделаем: если мы в isErrorMode, то единственная клавиша, которая снимет ошибку — это expectedChar.
                        // Если нажали правильную букву (совпадает с ожидаемой) то ошибка сбрасывается, но курсор остаётся? 
                        // или переходит дальше? логичнее: после ошибочного ввода мы блокируем ДВИЖЕНИЕ вперёд. 
                        // Если нажать правильную букву — ошибка исчезает, курсор остаётся на месте? или идёт дальше?
                        // По классике: блокировка — нужно нажать правильную букву, и она же засчитывается (переход на следующий символ).
                        // Сделаем так: в режиме ошибки мы ожидаем ТОЛЬКО правильную букву. Как только она нажата:
                        // - выходим из ошибки
                        // - увеличиваем currentIndex (переходим дальше)
                        // - отключаем мигание.
                        if (isErrorMode) {
                            // нажали правильную букву в момент ошибки
                            isErrorMode = false;
                            referenceDisplay.classList.remove('error-flash');
                            currentIndex++; // так как буква правильная идём дальше
                            e.preventDefault(); // не печатаем в полях ввода
                            updateDisplay();
                            return;
                        }
                    } else {
                        // нет ошибки — всё супер, двигаемся
                        currentIndex++;
                        e.preventDefault();
                        updateDisplay();
                        return;
                    }
                } else {
                    // неправильная клавиша!
                    // включаем режим ошибки и красное мигание.
                    isErrorMode = true;
                    referenceDisplay.classList.add('error-flash');
                    e.preventDefault(); // блокируем ввод символа
                    
                    // дополнительно — убираем мигание через 0.3 сек, но если ошибка не исправлена, оно остаётся.
                    // но класс остаётся, пока не нажмут правильную букву
                    updateDisplay(); // обновить интерфейс (позиция не меняется)
                    return;
                }
            } else {
                // нажата клавиша вроде "Shift" — уже отсекли вверху, но оставим заглушку
                return;
            }
            // предотвращаем стандартное поведение для всех обработанных символов
            e.preventDefault();
        }

        // Сброс мигания и ошибки вручную? пользователь должен сам нажать правильную клавишу.
        // Дополнительно: клик по кнопке resetBtn сбрасывает всё, включая ошибку
        resetBtn.addEventListener('click', function() {
            resetTyping();
        });

        // Загрузить текст по кнопке
        loadTextBtn.addEventListener('click', function() {
            loadTextFromInput();
        });

        // Инициализация: поставить текст из textarea при старте (если там пусто, грузим дефолтный)
        window.addEventListener('load', function() {
            if (!sourceTextarea.value.trim()) {
                sourceTextarea.value = "The quick brown fox jumps over the lazy dog.";
            }
            targetText = sourceTextarea.value;
            resetTyping();

            // Вешаем глобальный слушатель клавиш
            document.addEventListener('keydown', handleKeyDown);
        });

        // Подчищаем слушатель при выгрузке (хороший тон)
        window.addEventListener('beforeunload', function() {
            document.removeEventListener('keydown', handleKeyDown);
        });

        // На случай, если пользователь захочет перезадать текст через вставку, но не нажал кнопку? 
        // На всякий случай продублируем: изменение через textarea не меняет targetText автоматически, только по кнопке.
        // Это удобно: можно вставить длинный текст и только по кнопке загрузить.

        // Также добавим сброс ошибки при нажатии reset. Он уже есть.
        // Обработаем ситуацию, если весь текст закончился: мигание убираем.
        // Модифицируем updateDisplay чтобы убирать мигание если всё напечатано:
        const originalUpdate = updateDisplay;
        updateDisplay = function() {
            originalUpdate();
            if (currentIndex >= targetText.length) {
                referenceDisplay.classList.remove('error-flash');
                isErrorMode = false;
            }
        };
        updateDisplay(); // переопределили и вызвали

        // Замена функции на лету
        updateDisplay = updateDisplay.bind(this);
        // Переопределим обработчик, чтобы использовать новую updateDisplay
        // повесим новые функции
        window.updateDisplay = updateDisplay;
        // исправим handleKeyDown для вызова обновлённой.
        // сохраним старую и заменим, проще кодом:
        const oldHandler = handleKeyDown;
        document.removeEventListener('keydown', oldHandler);
        // новый обработчик
        function newHandler(e) {
            // копия логики
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            const key = e.key;
            if (key === 'Backspace' || key === 'Tab' || key === 'Escape' || key === 'F5' || key === 'F12' ||
                key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight' ||
                key === 'Home' || key === 'End' || key === 'PageUp' || key === 'PageDown' ||
                key === 'CapsLock' || key === 'Shift' || key === 'Control' || key === 'Alt' || key === 'Meta' ||
                key === 'Insert' || key === 'Delete') {
                return;
            }
            if (currentIndex >= targetText.length) {
                e.preventDefault();
                return;
            }
            const expectedChar = targetText[currentIndex];
            if (key.length === 1) {
                if (key === expectedChar) {
                    if (isErrorMode) {
                        // правильная буква выводит из ошибки и двигает
                        isErrorMode = false;
                        referenceDisplay.classList.remove('error-flash');
                        currentIndex++;
                        e.preventDefault();
                        updateDisplay();
                        return;
                    } else {
                        currentIndex++;
                        e.preventDefault();
                        updateDisplay();
                        return;
                    }
                } else {
                    // ошибка
                    isErrorMode = true;
                    referenceDisplay.classList.add('error-flash');
                    e.preventDefault();
                    updateDisplay();
                    return;
                }
            }
        }
        document.addEventListener('keydown', newHandler);
        // заменяем обработчик сброса для чистоты
        // готово.
    })();
</script>
</body>
</html>
